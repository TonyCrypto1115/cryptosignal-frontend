<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
<title>CryptoSignal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --cream: #fdf6f0;
  --warm-white: #fff9f5;
  --peach: #f4a07a;
  --coral: #e8735a;
  --rose: #d4647a;
  --gold: #e8a94a;
  --sage: #7ab5a0;
  --text: #2d2420;
  --text-soft: #7a6258;
  --text-muted: #b09890;
  --card: rgba(255,255,255,0.75);
  --card-border: rgba(212,164,140,0.2);
  --signal-long: #2daa7a;
  --signal-short: #e05060;
  --signal-watch: #e8a94a;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 20% 10%,rgba(248,180,150,.35) 0%,transparent 60%),radial-gradient(ellipse 60% 80% at 85% 20%,rgba(212,150,180,.25) 0%,transparent 55%),radial-gradient(ellipse 70% 50% at 50% 90%,rgba(150,200,185,.2) 0%,transparent 60%),radial-gradient(ellipse 90% 70% at 10% 70%,rgba(240,210,160,.2) 0%,transparent 55%);pointer-events:none;z-index:0}

/* Header */
#header{position:sticky;top:0;z-index:100;padding:16px 20px 12px;background:rgba(253,246,240,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--card-border)}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
#logo{font-size:19px;font-weight:700;letter-spacing:-.5px;background:linear-gradient(135deg,var(--coral),var(--rose));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#update-time{font-size:11px;color:var(--text-muted);font-family:'DM Mono',monospace}
.filter-tabs{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none}
.filter-tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600;border:1.5px solid var(--card-border);background:transparent;color:var(--text-muted);cursor:pointer;transition:all .2s}
.tab.active{background:var(--text);color:#fff;border-color:var(--text)}
.tab.tlong{border-color:var(--signal-long);color:var(--signal-long)}
.tab.tlong.active{background:var(--signal-long);color:#fff}
.tab.tshort{border-color:var(--signal-short);color:var(--signal-short)}
.tab.tshort.active{background:var(--signal-short);color:#fff}

/* Progress */
#progress-wrap{height:3px;background:var(--card-border);display:none}
#progress-fill{height:100%;background:linear-gradient(90deg,var(--peach),var(--rose));width:0%;transition:width .3s;border-radius:2px}

/* Banner */
#signal-banner{display:none;margin:10px 16px 0;padding:10px 14px;background:linear-gradient(135deg,rgba(45,170,122,.12),rgba(45,170,122,.06));border:1px solid rgba(45,170,122,.25);border-radius:12px;font-size:12px;font-weight:600;color:var(--signal-long)}

/* Content */
#content{position:relative;z-index:1;padding:12px 16px 60px}

/* Coin Card */
.coin-card{background:var(--card);backdrop-filter:blur(12px);border:1px solid var(--card-border);border-radius:20px;padding:16px;margin-bottom:10px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.coin-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:20px 20px 0 0;opacity:0;transition:opacity .2s}
.coin-card.sig-LONG::before{background:linear-gradient(90deg,var(--signal-long),#5dd4a8);opacity:1}
.coin-card.sig-SHORT::before{background:linear-gradient(90deg,var(--signal-short),#f08090);opacity:1}
.coin-card:active{transform:scale(.98)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.coin-sym{font-size:17px;font-weight:700;letter-spacing:-.3px}
.coin-fullname{font-size:11px;color:var(--text-muted);margin-top:1px}
.coin-price{font-family:'DM Mono',monospace;font-size:16px;font-weight:500;text-align:right}
.coin-change{font-size:12px;font-weight:600;margin-top:2px;text-align:right}
.up{color:var(--signal-long)}.dn{color:var(--signal-short)}
.indicators{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:10px}
.ind-badge{padding:3px 9px;border-radius:8px;font-size:11px;font-family:'DM Mono',monospace;font-weight:500;background:rgba(0,0,0,.05);color:var(--text-soft)}
.signal-pill{margin-left:auto;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.3px;border:1px solid}
.signal-pill.LONG{background:rgba(45,170,122,.15);color:var(--signal-long);border-color:rgba(45,170,122,.3)}
.signal-pill.SHORT{background:rgba(224,80,96,.12);color:var(--signal-short);border-color:rgba(224,80,96,.25)}
.signal-pill.WATCH{background:rgba(232,169,74,.12);color:var(--signal-watch);border-color:rgba(232,169,74,.25)}
.signal-pill.HOLD{background:rgba(0,0,0,.05);color:var(--text-muted);border-color:var(--card-border)}

/* Signal Card */
.signal-card{margin-top:10px;padding:14px;border-radius:14px;border:1px solid}
.signal-card.LONG{background:linear-gradient(135deg,rgba(45,170,122,.08),rgba(45,170,122,.04));border-color:rgba(45,170,122,.25)}
.signal-card.SHORT{background:linear-gradient(135deg,rgba(224,80,96,.08),rgba(224,80,96,.04));border-color:rgba(224,80,96,.2)}
.signal-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.signal-emoji{font-size:16px}
.signal-title{font-size:14px;font-weight:700}
.signal-title.LONG{color:var(--signal-long)}
.signal-title.SHORT{color:var(--signal-short)}
.signal-prices{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.price-item{text-align:center}
.price-label{font-size:10px;color:var(--text-muted);margin-bottom:2px}
.price-value{font-family:'DM Mono',monospace;font-size:13px;font-weight:600}
.price-value.entry{color:var(--text)}
.price-value.sl{color:var(--signal-short)}
.price-value.tp{color:var(--signal-long)}
.signal-reason{font-size:12px;color:var(--text-soft);line-height:1.5;padding-top:8px;border-top:1px solid var(--card-border)}

/* Detail Panel */
#overlay{display:none;position:fixed;inset:0;background:rgba(45,36,32,.4);backdrop-filter:blur(4px);z-index:199}
#detail-panel{display:none;position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--warm-white);border-radius:24px 24px 0 0;max-height:90vh;overflow-y:auto;box-shadow:0 -8px 40px rgba(0,0,0,.12);padding-bottom:40px;animation:slideUp .3s cubic-bezier(.32,.72,0,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.panel-handle{width:36px;height:4px;background:var(--card-border);border-radius:2px;margin:12px auto 16px}
.panel-header{padding:0 20px 16px;border-bottom:1px solid var(--card-border)}
.panel-sym{font-size:24px;font-weight:700;letter-spacing:-.5px}
.panel-name{font-size:13px;color:var(--text-muted);margin-top:2px;margin-bottom:10px}
.panel-price-row{display:flex;align-items:baseline;gap:10px}
.panel-price{font-family:'DM Mono',monospace;font-size:26px;font-weight:500}
.panel-change{font-size:14px;font-weight:600}
.panel-body{padding:16px 20px}
.ind-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}
.ind-box{background:var(--card);border:1px solid var(--card-border);border-radius:14px;padding:12px;text-align:center}
.ind-box-label{font-size:10px;color:var(--text-muted);margin-bottom:4px}
.ind-box-val{font-family:'DM Mono',monospace;font-size:18px;font-weight:600}
.trend-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;margin-bottom:16px}
.trend-badge.BULL{background:rgba(45,170,122,.12);color:var(--signal-long)}
.trend-badge.BEAR{background:rgba(224,80,96,.1);color:var(--signal-short)}
.trend-badge.NEUTRAL{background:rgba(0,0,0,.06);color:var(--text-muted)}
.section-title{font-size:11px;font-weight:600;color:var(--text-muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px}
.tv-wrap{border-radius:16px;overflow:hidden;margin-top:0;border:1px solid var(--card-border)}

/* Loading */
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:16px}
.loader{width:36px;height:36px;border:3px solid var(--card-border);border-top-color:var(--coral);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-text{font-size:13px;color:var(--text-muted)}
.load-progress{font-size:11px;color:var(--text-muted);font-family:'DM Mono',monospace}
</style>
</head>
<body>

<div id="header">
  <div class="header-top">
    <div id="logo">CryptoSignal ✦</div>
    <div id="update-time">載入中…</div>
  </div>
  <div class="filter-tabs">
    <button class="tab active" onclick="setFilter('ALL',this)">全部 <span id="cnt-all"></span></button>
    <button class="tab tlong" onclick="setFilter('LONG',this)">做多 <span id="cnt-long"></span></button>
    <button class="tab tshort" onclick="setFilter('SHORT',this)">做空 <span id="cnt-short"></span></button>
    <button class="tab" onclick="setFilter('WATCH',this)">觀望 <span id="cnt-watch"></span></button>
  </div>
</div>

<div id="progress-wrap"><div id="progress-fill"></div></div>
<div id="signal-banner"></div>

<div id="content">
  <div id="loading">
    <div class="loader"></div>
    <div class="load-text">載入幣種資料中…</div>
    <div class="load-progress" id="load-pct">0 / 20</div>
  </div>
  <div id="coin-list" style="display:none"></div>
</div>

<div id="overlay" onclick="closePanel()"></div>
<div id="detail-panel">
  <div class="panel-handle" onclick="closePanel()"></div>
  <div id="panel-content"></div>
</div>

<script>
const SYMBOLS=["BTCUSDT","ETHUSDT","BNBUSDT","SOLUSDT","XRPUSDT","DOGEUSDT","ADAUSDT","AVAXUSDT","TRXUSDT","DOTUSDT","LINKUSDT","LTCUSDT","UNIUSDT","ATOMUSDT","APTUSDT","INJUSDT","ARBUSDT","OPUSDT","SUIUSDT","NEARUSDT"];
const NAMES={BTCUSDT:"Bitcoin",ETHUSDT:"Ethereum",BNBUSDT:"BNB",SOLUSDT:"Solana",XRPUSDT:"XRP",DOGEUSDT:"Dogecoin",ADAUSDT:"Cardano",AVAXUSDT:"Avalanche",TRXUSDT:"TRON",DOTUSDT:"Polkadot",LINKUSDT:"Chainlink",LTCUSDT:"Litecoin",UNIUSDT:"Uniswap",ATOMUSDT:"Cosmos",APTUSDT:"Aptos",INJUSDT:"Injective",ARBUSDT:"Arbitrum",OPUSDT:"Optimism",SUIUSDT:"Sui",NEARUSDT:"NEAR"};
const SL=0.03,TP=0.06;
let coinData={},filterMode="ALL";

async function fetchBybit(symbol,interval,limit){
  try{
    const r=await fetch(`https://api.bybit.com/v5/market/kline?category=linear&symbol=${symbol}&interval=${interval}&limit=${limit}`);
    const j=await r.json();
    if(j.retCode!==0)return null;
    const list=j.result.list.reverse();
    return{closes:list.map(k=>parseFloat(k[4])),highs:list.map(k=>parseFloat(k[2])),lows:list.map(k=>parseFloat(k[3])),volumes:list.map(k=>parseFloat(k[5]))};
  }catch(e){return null;}
}

async function fetchTicker(symbol){
  try{
    const r=await fetch(`https://api.bybit.com/v5/market/tickers?category=linear&symbol=${symbol}`);
    const j=await r.json();
    const t=j.result?.list?.[0];
    return t?{price:parseFloat(t.lastPrice),change24h:parseFloat(t.price24hPcnt)*100}:null;
  }catch(e){return null;}
}

const calcMA=(arr,n)=>arr.length<n?null:arr.slice(-n).reduce((a,b)=>a+b,0)/n;

function calcRSI(closes,period=14){
  if(closes.length<period*3)return null;
  let g=0,l=0;
  for(let i=1;i<=period;i++){const d=closes[i]-closes[i-1];if(d>0)g+=d;else l-=d;}
  let ag=g/period,al=l/period;
  for(let i=period+1;i<closes.length;i++){
    const d=closes[i]-closes[i-1];
    ag=(ag*(period-1)+(d>0?d:0))/period;
    al=(al*(period-1)+(d<0?-d:0))/period;
  }
  if(al===0)return 100;
  return parseFloat((100-100/(1+ag/al)).toFixed(1));
}

function calcKD(highs,lows,closes,period=9,sK=3,sD=3){
  if(closes.length<period+10)return null;
  const rawK=[];
  for(let i=period-1;i<closes.length;i++){
    const h=Math.max(...highs.slice(i-period+1,i+1));
    const l=Math.min(...lows.slice(i-period+1,i+1));
    rawK.push(h===l?50:((closes[i]-l)/(h-l))*100);
  }
  const km=2/(sK+1),dm=2/(sD+1);
  const kArr=[rawK[0]];
  for(let i=1;i<rawK.length;i++)kArr.push(rawK[i]*km+kArr[i-1]*(1-km));
  const dArr=[kArr[0]];
  for(let i=1;i<kArr.length;i++)dArr.push(kArr[i]*dm+dArr[i-1]*(1-dm));
  return{k:parseFloat(kArr[kArr.length-1].toFixed(1)),d:parseFloat(dArr[dArr.length-1].toFixed(1)),prevK:parseFloat(kArr[kArr.length-2].toFixed(1)),prevD:parseFloat(dArr[dArr.length-2].toFixed(1))};
}

function buildSignal(c){
  if(!c||!c.rsi||!c.kd)return{signal:"HOLD"};
  const{rsi,kd,dailyTrend,price}=c;
  const golden=kd.prevK<=kd.prevD&&kd.k>kd.d;
  const death=kd.prevK>=kd.prevD&&kd.k<kd.d;
  if(golden&&kd.k<30&&kd.d<30&&rsi<40&&dailyTrend!=="BEAR"){
    return{signal:"LONG",sl:parseFloat((price*(1-SL)).toFixed(4)),tp:parseFloat((price*(1+TP)).toFixed(4)),reason:`KD金叉（K=${kd.k} 穿越 D=${kd.d}）+ RSI超賣 ${rsi}`,type:"KD金叉反彈"};
  }
  if(death&&kd.k>70&&kd.d>70&&rsi>60&&dailyTrend!=="BULL"){
    return{signal:"SHORT",sl:parseFloat((price*(1+SL)).toFixed(4)),tp:parseFloat((price*(1-TP)).toFixed(4)),reason:`KD死叉（K=${kd.k} 跌破 D=${kd.d}）+ RSI超買 ${rsi}`,type:"KD死叉反壓"};
  }
  if((kd.k<35&&rsi<45)||(kd.k>65&&rsi>55))return{signal:"WATCH"};
  return{signal:"HOLD"};
}

const fmt=n=>{if(!n&&n!==0)return"—";if(n<0.001)return n.toFixed(6);if(n<1)return n.toFixed(4);if(n<100)return n.toFixed(3);return n.toLocaleString("en-US",{maximumFractionDigits:2})};

function sparkline(closes,change){
  const pts=closes.slice(-30);
  const min=Math.min(...pts),max=Math.max(...pts),range=max-min||1;
  const color=change>=0?"#2daa7a":"#e05060";
  const coords=pts.map((p,i)=>`${(i/(pts.length-1))*100},${34-((p-min)/range)*30-2}`).join(" ");
  return`<svg width="100%" height="36" viewBox="0 0 100 36" preserveAspectRatio="none" style="display:block"><polyline points="${coords}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round" opacity="0.85"/></svg>`;
}

function sigCard(c,sym,sig){
  if(sig.signal!=="LONG"&&sig.signal!=="SHORT")return"";
  const emoji=sig.signal==="LONG"?"🟢":"🔴";
  const title=sig.signal==="LONG"?"做多 ▲ 信號":"做空 ▼ 信號";
  return`<div class="signal-card ${sig.signal}">
    <div class="signal-header"><span class="signal-emoji">${emoji}</span><span class="signal-title ${sig.signal}">${title}</span></div>
    <div class="signal-prices">
      <div class="price-item"><div class="price-label">📍 進場價</div><div class="price-value entry">$${fmt(c.price)}</div></div>
      <div class="price-item"><div class="price-label">🛑 止損 -3%</div><div class="price-value sl">$${fmt(sig.sl)}</div></div>
      <div class="price-item"><div class="price-label">🎯 止盈 +6%</div><div class="price-value tp">$${fmt(sig.tp)}</div></div>
    </div>
    <div class="signal-reason"><strong>進場依據：</strong>${sig.reason}</div>
  </div>`;
}

function renderCard(sym){
  const c=coinData[sym];if(!c)return"";
  const sig=buildSignal(c);
  const up=c.change24h>=0;
  const rsiColor=!c.rsi?"#b09890":c.rsi<35?"#2daa7a":c.rsi>65?"#e05060":"#e8a94a";
  const kdColor=!c.kd?"#b09890":c.kd.k<30?"#2daa7a":c.kd.k>70?"#e05060":"#b09890";
  const sigLabels={LONG:"▲ 做多",SHORT:"▼ 做空",WATCH:"◎ 觀望",HOLD:"— 持有"};
  return`<div class="coin-card sig-${sig.signal}" onclick="openPanel('${sym}')">
    <div class="card-top">
      <div><div class="coin-sym">${sym.replace("USDT","")}</div><div class="coin-fullname">${NAMES[sym]||""}</div></div>
      <div><div class="coin-price">$${fmt(c.price)}</div><div class="coin-change ${up?"up":"dn"}">${up?"+":""}${c.change24h?.toFixed(2)}%</div></div>
    </div>
    ${c.closes15?sparkline(c.closes15,c.change24h):""}
    <div class="indicators">
      <span class="ind-badge" style="color:${rsiColor}">RSI ${c.rsi||"…"}</span>
      <span class="ind-badge" style="color:${kdColor}">K ${c.kd?.k||"…"}</span>
      <span class="ind-badge">D ${c.kd?.d||"…"}</span>
      <span class="signal-pill ${sig.signal}">${sigLabels[sig.signal]}</span>
    </div>
    ${sigCard(c,sym,sig)}
  </div>`;
}

function renderList(){
  const coins=SYMBOLS.map(s=>({sym:s,sig:buildSignal(coinData[s]||{})}));
  const longs=coins.filter(c=>c.sig.signal==="LONG");
  const shorts=coins.filter(c=>c.sig.signal==="SHORT");
  const watches=coins.filter(c=>c.sig.signal==="WATCH");
  document.getElementById("cnt-all").textContent=`(${coins.length})`;
  document.getElementById("cnt-long").textContent=longs.length?`(${longs.length})`:"";
  document.getElementById("cnt-short").textContent=shorts.length?`(${shorts.length})`:"";
  document.getElementById("cnt-watch").textContent=watches.length?`(${watches.length})`:"";
  const banner=document.getElementById("signal-banner");
  if(longs.length>0){banner.style.display="block";banner.textContent=`✦ 做多信號：${longs.map(c=>c.sym.replace("USDT","")).join("・")}`;}
  else banner.style.display="none";
  const filtered=filterMode==="ALL"?coins:coins.filter(c=>c.sig.signal===filterMode);
  document.getElementById("coin-list").innerHTML=filtered.map(c=>renderCard(c.sym)).join("");
  document.getElementById("update-time").textContent=new Date().toLocaleTimeString("zh-TW");
}

function openPanel(sym){
  const c=coinData[sym];if(!c)return;
  const sig=buildSignal(c);
  const up=c.change24h>=0;
  const rsiColor=!c.rsi?"#b09890":c.rsi<35?"#2daa7a":c.rsi>65?"#e05060":"#e8a94a";
  const kdKColor=!c.kd?"#b09890":c.kd.k<30?"#2daa7a":c.kd.k>70?"#e05060":"#b09890";
  const trendLabels={BULL:"↑ 日線多頭",BEAR:"↓ 日線空頭",NEUTRAL:"→ 日線中性"};
  let sigBlock="";
  if(sig.signal==="LONG"||sig.signal==="SHORT"){
    const emoji=sig.signal==="LONG"?"🟢":"🔴";
    sigBlock=`<div class="section-title" style="margin-bottom:10px">進場信號</div>
    <div class="signal-card ${sig.signal}" style="margin-bottom:16px">
      <div class="signal-header"><span class="signal-emoji">${emoji}</span><span class="signal-title ${sig.signal}">${sig.signal==="LONG"?"做多 ▲":"做空 ▼"} ｜ ${sym.replace("USDT","")}/USDT 永續</span></div>
      <div class="signal-prices">
        <div class="price-item"><div class="price-label">📍 進場價</div><div class="price-value entry" style="font-size:15px">$${fmt(c.price)}</div></div>
        <div class="price-item"><div class="price-label">🛑 止損 -3%</div><div class="price-value sl">$${fmt(sig.sl)}</div></div>
        <div class="price-item"><div class="price-label">🎯 止盈 +6%</div><div class="price-value tp">$${fmt(sig.tp)}</div></div>
      </div>
      <div class="signal-reason"><strong>進場依據：</strong>${sig.reason}<br><span style="font-size:11px;color:#b09890">策略：${sig.type} ｜ 1小時K</span></div>
    </div>`;
  }
  const tvSym=sym.replace("USDT","")+"USDT";
  document.getElementById("panel-content").innerHTML=`
    <div class="panel-header">
      <div class="panel-sym">${sym.replace("USDT","")}<span style="color:var(--text-muted);font-size:16px">/USDT</span></div>
      <div class="panel-name">${NAMES[sym]||""} · 永續合約</div>
      <div class="panel-price-row"><div class="panel-price">$${fmt(c.price)}</div><div class="panel-change ${up?"up":"dn"}">${up?"+":""}${c.change24h?.toFixed(2)}%</div></div>
    </div>
    <div class="panel-body">
      <div class="trend-badge ${c.dailyTrend||"NEUTRAL"}">${trendLabels[c.dailyTrend||"NEUTRAL"]}</div>
      <div class="ind-grid">
        <div class="ind-box"><div class="ind-box-label">RSI (14)</div><div class="ind-box-val" style="color:${rsiColor}">${c.rsi||"—"}</div></div>
        <div class="ind-box"><div class="ind-box-label">KD · K值</div><div class="ind-box-val" style="color:${kdKColor}">${c.kd?.k||"—"}</div></div>
        <div class="ind-box"><div class="ind-box-label">KD · D值</div><div class="ind-box-val">${c.kd?.d||"—"}</div></div>
      </div>
      ${sigBlock}
      <div class="section-title">K線圖（1小時）</div>
      <div class="tv-wrap">
        <iframe src="https://www.tradingview.com/widgetsnippet/symbol/BYBIT:${tvSym}.P/?interval=60&theme=dark&style=1&locale=zh_TW&toolbar_bg=%231a1a2e&hide_side_toolbar=1&allow_symbol_change=0" style="width:100%;height:340px;border:none" allowtransparency="true" frameborder="0"></iframe>
      </div>
      <div style="font-size:10px;color:var(--text-muted);text-align:center;margin-top:14px">⚠️ 以上僅供參考，不構成投資建議。加密貨幣具高度風險。</div>
    </div>`;
  document.getElementById("overlay").style.display="block";
  document.getElementById("detail-panel").style.display="block";
}

function closePanel(){
  document.getElementById("overlay").style.display="none";
  document.getElementById("detail-panel").style.display="none";
}

function setFilter(mode,el){
  filterMode=mode;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");
  renderList();
}

async function loadCoin(sym,idx){
  const[h1,daily,ticker]=await Promise.all([fetchBybit(sym,"60",500),fetchBybit(sym,"D",50),fetchTicker(sym)]);
  if(!h1||!daily||!ticker)return;
  const dMA13=calcMA(daily.closes,13),dMA34=calcMA(daily.closes,34);
  coinData[sym]={
    price:ticker.price,change24h:ticker.change24h,closes15:h1.closes,
    rsi:calcRSI(h1.closes,14),kd:calcKD(h1.highs,h1.lows,h1.closes),
    dailyTrend:dMA13&&dMA34?(dMA13>dMA34*1.02?"BULL":dMA13<dMA34*0.98?"BEAR":"NEUTRAL"):"NEUTRAL",
  };
  document.getElementById("load-pct").textContent=`${idx+1} / ${SYMBOLS.length}`;
  document.getElementById("progress-fill").style.width=`${((idx+1)/SYMBOLS.length)*100}%`;
}

async function init(){
  document.getElementById("progress-wrap").style.display="block";
  for(let i=0;i<SYMBOLS.length;i++){
    await loadCoin(SYMBOLS[i],i);
    if(i%4===3)await new Promise(r=>setTimeout(r,100));
  }
  document.getElementById("progress-wrap").style.display="none";
  document.getElementById("loading").style.display="none";
  document.getElementById("coin-list").style.display="block";
  renderList();
  setInterval(async()=>{
    await Promise.all(SYMBOLS.map(async sym=>{const t=await fetchTicker(sym);if(t&&coinData[sym]){coinData[sym].price=t.price;coinData[sym].change24h=t.change24h;}}));
    renderList();
  },30000);
  setInterval(async()=>{
    for(let i=0;i<SYMBOLS.length;i++){await loadCoin(SYMBOLS[i],i);await new Promise(r=>setTimeout(r,200));}
    renderList();
  },15*60*1000);
}
init();
</script>
</body>
</html>
