<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
<title>CryptoSignal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#fdf7f2;--card:#ffffff;--border:rgba(200,168,148,0.18);
  --text:#221a16;--soft:#8a6e62;--muted:#c4a898;
  --coral:#e06050;--rose:#c8506a;
  --long:#28a870;--short:#e04858;--watch:#d4903a;
  --ds:'Dancing Script',cursive;
  --mono:'DM Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 90% 50% at 5% 5%,rgba(240,155,100,.22),transparent 55%),
    radial-gradient(ellipse 70% 60% at 95% 15%,rgba(200,125,155,.18),transparent 50%),
    radial-gradient(ellipse 60% 50% at 55% 95%,rgba(115,180,160,.15),transparent 55%)}

/* ── SVG icon helper ── */
.ic{width:13px;height:13px;display:inline-block;vertical-align:middle;flex-shrink:0}
.ic-sm{width:11px;height:11px;display:inline-block;vertical-align:middle;flex-shrink:0}

/* ── HEADER ── */
#hdr{position:sticky;top:0;z-index:50;background:rgba(253,247,242,.92);backdrop-filter:blur(18px);border-bottom:1px solid var(--border);padding:14px 16px 10px}
.hdr-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
#logo{font-size:18px;font-weight:700;letter-spacing:-.4px;background:linear-gradient(135deg,var(--coral),var(--rose));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.4}
#upd{font-size:11px;color:var(--muted);font-family:var(--mono);padding-top:4px}
.tabs{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:4px 14px;border-radius:20px;font-size:12px;font-weight:600;border:1.5px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s}
.tab.on{background:var(--text);color:#fff;border-color:var(--text)}
.tab.tl{border-color:var(--long);color:var(--long)}.tab.tl.on{background:var(--long);color:#fff}
.tab.ts{border-color:var(--short);color:var(--short)}.tab.ts.on{background:var(--short);color:#fff}
.tab.tp{border-color:var(--coral);color:var(--coral)}.tab.tp.on{background:var(--coral);color:#fff}

/* ── PROGRESS ── */
#pgwrap{height:2px;background:var(--border);display:none}
#pgfill{height:100%;background:linear-gradient(90deg,#f09060,var(--rose));width:0%;transition:width .25s}

/* ── BANNER ── */
#banner{display:none;margin:10px 16px 0;padding:9px 14px;background:rgba(40,168,112,.1);border:1px solid rgba(40,168,112,.25);border-radius:12px;font-size:12px;font-weight:600;color:var(--long)}

/* ── PAGES ── */
#content{position:relative;z-index:1;padding:12px 14px 60px}
.page{display:none}.page.active{display:block}

/* ── LOADING ── */
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 0;gap:14px}
.spinner{width:34px;height:34px;border:2.5px solid var(--border);border-top-color:var(--coral);border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#load-txt{font-size:13px;color:var(--muted)}
#load-n{font-size:11px;color:var(--muted);font-family:var(--mono)}

/* ── COIN GRID ── */
#coin-list,#coin-list-long,#coin-list-short{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.ccard{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:14px 13px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.ccard:active{transform:scale(.97)}

/* top bar */
.ccard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:18px 18px 0 0;opacity:0;transition:opacity .3s}
.ccard.sLONG::before{background:var(--long);opacity:1}
.ccard.sSHORT::before{background:var(--short);opacity:1}
.ccard.sWATCH::before{background:var(--watch);opacity:1}
.ccard.sHOLDING_LONG::before{background:var(--long);opacity:1}
.ccard.sHOLDING_SHORT::before{background:var(--short);opacity:1}

/* signal glow */
.ccard.sLONG{background:linear-gradient(160deg,rgba(40,168,112,.08) 0%,#fff 60%);box-shadow:0 0 0 1px rgba(40,168,112,.2),0 4px 20px rgba(40,168,112,.12)}
.ccard.sSHORT{background:linear-gradient(160deg,rgba(224,72,88,.07) 0%,#fff 60%);box-shadow:0 0 0 1px rgba(224,72,88,.18),0 4px 20px rgba(224,72,88,.1)}
.ccard.sHOLDING_LONG{background:linear-gradient(160deg,rgba(40,168,112,.1) 0%,#fff 60%);box-shadow:0 0 0 1px rgba(40,168,112,.25),0 4px 24px rgba(40,168,112,.15)}
.ccard.sHOLDING_SHORT{background:linear-gradient(160deg,rgba(224,72,88,.09) 0%,#fff 60%);box-shadow:0 0 0 1px rgba(224,72,88,.22),0 4px 24px rgba(224,72,88,.13)}

.cc-sym{font-size:16px;font-weight:700;letter-spacing:-.3px;margin-bottom:1px}
.cc-name{font-size:10px;color:var(--muted);margin-bottom:8px}
.cc-price{font-family:var(--mono);font-size:14px;font-weight:500;margin-bottom:2px}
.cc-chg{font-size:11px;font-weight:600;margin-bottom:10px}
.up{color:var(--long)}.dn{color:var(--short)}

/* RSI bar */
.rsi-bar-wrap{margin-bottom:8px}
.rsi-bar-label{display:flex;justify-content:space-between;align-items:center;font-size:10px;color:var(--muted);margin-bottom:3px;font-family:var(--mono)}
.rsi-bar-track{height:4px;background:rgba(0,0,0,.06);border-radius:10px;overflow:hidden;position:relative}
.rsi-bar-fill{height:100%;border-radius:10px;transition:width .6s cubic-bezier(.4,0,.2,1)}
/* zone markers */
.rsi-bar-track::before{content:'';position:absolute;left:35%;top:0;bottom:0;width:1px;background:rgba(0,0,0,.1)}
.rsi-bar-track::after{content:'';position:absolute;left:65%;top:0;bottom:0;width:1px;background:rgba(0,0,0,.1)}

/* KD row */
.kd-row{display:flex;gap:6px;margin-bottom:10px;align-items:center}
.kd-badge{font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:6px;background:rgba(0,0,0,.05);color:var(--soft)}

/* signal pill - Dancing Script */
.spill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700;border:1px solid;font-family:var(--ds)}
.spill.LONG{background:rgba(40,168,112,.13);color:var(--long);border-color:rgba(40,168,112,.3)}
.spill.SHORT{background:rgba(224,72,88,.1);color:var(--short);border-color:rgba(224,72,88,.25)}
.spill.WATCH{background:rgba(212,144,58,.1);color:var(--watch);border-color:rgba(212,144,58,.25)}
.spill.HOLD{background:rgba(0,0,0,.04);color:var(--muted);border-color:var(--border)}
.spill.HOLDING{background:linear-gradient(135deg,rgba(40,168,112,.15),rgba(224,96,80,.1));color:var(--long);border-color:rgba(40,168,112,.3)}

/* pnl tag on card */
.pnl-tag{font-size:10px;font-weight:600;margin-top:5px;font-family:var(--mono)}

/* ── DETAIL PANEL ── */
#ovl{display:none;position:fixed;inset:0;background:rgba(34,26,22,.38);backdrop-filter:blur(5px);z-index:100}
#dpanel{display:none;position:fixed;bottom:0;left:0;right:0;z-index:101;background:var(--bg);border-radius:22px 22px 0 0;max-height:92vh;overflow-y:auto;box-shadow:0 -10px 48px rgba(0,0,0,.14);padding-bottom:40px;animation:sup .28s cubic-bezier(.32,.72,0,1)}
@keyframes sup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.dhandle{width:34px;height:4px;background:var(--border);border-radius:2px;margin:11px auto 14px;cursor:pointer}
.dhead{padding:0 18px 14px;border-bottom:1px solid var(--border)}
.dsym{font-size:22px;font-weight:700;letter-spacing:-.4px}
.dsym span{color:var(--muted);font-size:14px}
.dname{font-size:12px;color:var(--muted);margin:2px 0 8px}
.dprice{font-family:var(--mono);font-size:24px;font-weight:500}
.dchg{font-size:13px;font-weight:600}
.dbody{padding:16px 18px 10px}
.trbadge{display:inline-flex;align-items:center;gap:5px;padding:5px 13px;border-radius:20px;font-size:12px;font-weight:600;margin-bottom:14px}
.trbadge.BULL{background:rgba(40,168,112,.1);color:var(--long)}
.trbadge.BEAR{background:rgba(224,72,88,.08);color:var(--short)}
.trbadge.NEUTRAL{background:rgba(0,0,0,.05);color:var(--muted)}

/* detail indicator boxes */
.iboxes{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.ibox{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:11px 8px;text-align:center}
.ibox-lbl{font-size:10px;color:var(--muted);margin-bottom:3px}
.ibox-val{font-family:var(--mono);font-size:20px;font-weight:600}

/* RSI bar in detail */
.d-rsi-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:14px}
.d-rsi-title{font-size:10px;color:var(--muted);margin-bottom:8px;font-weight:600;letter-spacing:.3px;text-transform:uppercase}
.d-rsi-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.d-rsi-lbl{font-size:11px;color:var(--soft);width:28px;font-family:var(--mono)}
.d-rsi-track{flex:1;height:5px;background:rgba(0,0,0,.06);border-radius:10px;overflow:hidden;position:relative}
.d-rsi-track::before{content:'';position:absolute;left:35%;top:0;bottom:0;width:1px;background:rgba(0,0,0,.1)}
.d-rsi-track::after{content:'';position:absolute;left:65%;top:0;bottom:0;width:1px;background:rgba(0,0,0,.1)}
.d-rsi-fill{height:100%;border-radius:10px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.d-rsi-val{font-size:12px;font-weight:700;font-family:var(--mono);width:36px;text-align:right}

.ana-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:13px;margin-bottom:14px}
.ana-title{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.4px;text-transform:uppercase;margin-bottom:10px}
.ana-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px}
.ana-row:last-child{border-bottom:none}
.ana-row-lbl{color:var(--soft)}
.ana-row-val{font-weight:600;font-family:var(--mono)}

/* signal card */
.sigcard{border-radius:14px;border:1px solid;padding:14px;margin-bottom:14px}
.sigcard.LONG{background:linear-gradient(135deg,rgba(40,168,112,.08),rgba(40,168,112,.04));border-color:rgba(40,168,112,.25)}
.sigcard.SHORT{background:linear-gradient(135deg,rgba(224,72,88,.08),rgba(224,72,88,.04));border-color:rgba(224,72,88,.2)}
.sigcard.HOLDING{background:linear-gradient(135deg,rgba(40,168,112,.06),rgba(224,96,80,.04));border-color:rgba(40,168,112,.2)}
.sc-head{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.sc-title{font-size:14px;font-weight:700;font-family:var(--ds)}
.sc-title.LONG{color:var(--long)}.sc-title.SHORT{color:var(--short)}.sc-title.HOLDING{color:var(--long)}
.sc-prices{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.sc-pitem{text-align:center}
.sc-plbl{font-size:10px;color:var(--muted);margin-bottom:3px;display:flex;align-items:center;justify-content:center;gap:3px}
.sc-pval{font-family:var(--mono);font-size:13px;font-weight:600}
.sc-pval.e{color:var(--text)}.sc-pval.s{color:var(--short)}.sc-pval.t{color:var(--long)}
.sc-reason{font-size:12px;color:var(--soft);line-height:1.55;padding-top:9px;border-top:1px solid var(--border)}
.sc-meta{font-size:10.5px;color:var(--muted);margin-top:5px;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.pnl-live{font-size:12px;font-weight:600;margin-top:6px;padding:5px 10px;border-radius:8px;display:inline-block}
.pnl-live.pos{background:rgba(40,168,112,.1);color:var(--long)}
.pnl-live.neg{background:rgba(224,72,88,.1);color:var(--short)}
.dwarn{font-size:10px;color:var(--muted);text-align:center;margin-top:14px}

/* ── PERFORMANCE PAGE ── */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px;text-align:center}
.stat-lbl{font-size:11px;color:var(--muted);margin-bottom:4px}
.stat-val{font-family:var(--mono);font-size:22px;font-weight:700}
.stat-val.green{color:var(--long)}.stat-val.red{color:var(--short)}.stat-val.gold{color:var(--watch)}
.winrate-bar{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:16px}
.wr-title{font-size:12px;color:var(--muted);margin-bottom:10px;font-weight:600}
.wr-bar-wrap{display:flex;height:8px;border-radius:4px;overflow:hidden;margin-bottom:8px}
.wr-bar-win{background:var(--long);transition:width .5s}
.wr-bar-loss{background:var(--short);flex:1}
.wr-legend{display:flex;justify-content:space-between;font-size:11px}
.sig-history{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.sig-history-title{padding:13px 14px;font-size:12px;font-weight:600;color:var(--muted);border-bottom:1px solid var(--border);letter-spacing:.3px;text-transform:uppercase}
.sig-row{display:flex;align-items:center;padding:11px 14px;border-bottom:1px solid var(--border);gap:10px;font-size:12px}
.sig-row:last-child{border-bottom:none}
.sig-row-dir{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sig-row-dir.LONG{background:rgba(40,168,112,.15)}
.sig-row-dir.SHORT{background:rgba(224,72,88,.12)}
.sig-row-info{flex:1;min-width:0}
.sig-row-sym{font-weight:700;font-size:13px}
.sig-row-date{font-size:10px;color:var(--muted);margin-top:1px}
.sig-row-price{text-align:right;font-family:var(--mono);font-size:11px;color:var(--soft)}
.result-badge{padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;font-family:var(--ds)}
.result-badge.WIN{background:rgba(40,168,112,.13);color:var(--long)}
.result-badge.LOSS{background:rgba(224,72,88,.1);color:var(--short)}
.result-badge.OPEN{background:rgba(212,144,58,.1);color:var(--watch)}
.empty-state{padding:40px;text-align:center;color:var(--muted);font-size:13px}
</style>
</head>
<body>

<div id="hdr">
  <div class="hdr-row">
    <div id="logo">CryptoSignal ✦<br><span style="font-size:11px;font-weight:500;letter-spacing:.2px;background:linear-gradient(135deg,#e06050,#c8506a);-webkit-background-clip:text;-webkit-text-fill-color:transparent">by Tony Chang · @blackheartcat1115</span></div>
    <div id="upd">載入中…</div>
  </div>
  <div class="tabs">
    <button class="tab on"  onclick="setTab('market',this)">市場</button>
    <button class="tab tl"  onclick="setTab('long',this)">做多 <span id="cl"></span></button>
    <button class="tab ts"  onclick="setTab('short',this)">做空 <span id="cs"></span></button>
    <button class="tab tp"  onclick="setTab('perf',this)">績效</button>
  </div>
</div>

<div id="pgwrap"><div id="pgfill"></div></div>
<div id="banner"></div>

<div id="content">
  <div id="loading">
    <div class="spinner"></div>
    <div id="load-txt">載入幣種資料中…</div>
    <div id="load-n">0 / 23</div>
  </div>
  <div class="page active" id="page-market"><div id="coin-list"></div></div>
  <div class="page" id="page-long"><div id="coin-list-long"></div></div>
  <div class="page" id="page-short"><div id="coin-list-short"></div></div>
  <div class="page" id="page-perf">
    <div style="margin-bottom:12px">
      <div style="font-size:13px;font-weight:600;color:var(--soft);margin-bottom:10px">交易績效統計</div>
      <div class="stat-grid">
        <div class="stat-box"><div class="stat-lbl">總信號數</div><div class="stat-val" id="p-total">—</div></div>
        <div class="stat-box"><div class="stat-lbl">勝率</div><div class="stat-val gold" id="p-wr">—</div></div>
        <div class="stat-box"><div class="stat-lbl">獲利筆數</div><div class="stat-val green" id="p-win">—</div></div>
        <div class="stat-box"><div class="stat-lbl">虧損筆數</div><div class="stat-val red" id="p-loss">—</div></div>
      </div>
      <div class="stat-box" style="margin-bottom:10px;text-align:center">
        <div class="stat-lbl">累積實際盈虧（已進場）</div>
        <div class="stat-val" id="p-pnl">—</div>
      </div>
      <div class="winrate-bar">
        <div class="wr-title">勝率分佈</div>
        <div class="wr-bar-wrap"><div class="wr-bar-win" id="p-bar" style="width:0%"></div><div class="wr-bar-loss"></div></div>
        <div class="wr-legend"><span style="color:var(--long)">止盈</span><span style="color:var(--short)">止損</span></div>
      </div>
    </div>
    <div class="sig-history">
      <div class="sig-history-title">歷史信號紀錄</div>
      <div id="p-history"></div>
    </div>
    <div style="font-size:10px;color:var(--muted);text-align:center;margin-top:14px;padding-bottom:4px">⚠️ 以上僅供參考，不構成投資建議。加密貨幣具高度風險，請謹慎評估。</div>
  </div>
</div>

<div id="ovl" onclick="closeP()"></div>
<div id="dpanel">
  <div class="dhandle" onclick="closeP()"></div>
  <div id="dpc"></div>
</div>

<script>
// ── SVG icons ────────────────────────────────────────────
const IC={
  up:`<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>`,
  dn:`<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M19 12l-7 7-7-7"/></svg>`,
  hold:`<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 12h8"/></svg>`,
  dot:`<svg class="ic-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M3 12h3M18 12h3M12 3v3M12 18v3"/></svg>`,
  x:`<svg class="ic-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>`,
  check:`<svg class="ic-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 6L9 17l-5-5"/></svg>`,
  pin:`<svg class="ic-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2l1.5 5.5L19 9l-5.5 1.5L12 16l-1.5-5.5L5 9l5.5-1.5z"/></svg>`,
  clock:`<svg class="ic-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>`,
  trend:`<svg class="ic-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>`,
};

// ── 常數 ────────────────────────────────────────────────
const SYMS=["BTCUSDT","ETHUSDT","BNBUSDT","SOLUSDT","XRPUSDT","DOGEUSDT","ADAUSDT","AVAXUSDT","TRXUSDT","DOTUSDT","LINKUSDT","LTCUSDT","UNIUSDT","ATOMUSDT","APTUSDT","INJUSDT","ARBUSDT","OPUSDT","SUIUSDT","NEARUSDT","AAVEUSDT","ONDOUSDT","PENDLEUSDT"];

// ── 指標 ─────────────────────────────────────────────────
const ma=(a,n)=>a.length<n?null:a.slice(-n).reduce((x,y)=>x+y,0)/n;
function calcRSI(c,p=14){
  if(c.length<p*3)return null;
  let g=0,l=0;
  for(let i=1;i<=p;i++){const d=c[i]-c[i-1];if(d>0)g+=d;else l-=d;}
  let ag=g/p,al=l/p;
  for(let i=p+1;i<c.length;i++){const d=c[i]-c[i-1];ag=(ag*(p-1)+(d>0?d:0))/p;al=(al*(p-1)+(d<0?-d:0))/p;}
  return al===0?100:parseFloat((100-100/(1+ag/al)).toFixed(1));
}
function calcKD(h,lo,c,p=9,sk=3,sd=3){
  if(c.length<p+10)return null;
  const rk=[];
  for(let i=p-1;i<c.length;i++){const hh=Math.max(...h.slice(i-p+1,i+1)),ll=Math.min(...lo.slice(i-p+1,i+1));rk.push(hh===ll?50:((c[i]-ll)/(hh-ll))*100);}
  const km=2/(sk+1),dm=2/(sd+1);
  const ka=[rk[0]];for(let i=1;i<rk.length;i++)ka.push(rk[i]*km+ka[i-1]*(1-km));
  const da=[ka[0]];for(let i=1;i<ka.length;i++)da.push(ka[i]*dm+da[i-1]*(1-dm));
  return{k:+ka[ka.length-1].toFixed(1),d:+da[da.length-1].toFixed(1),pk:+ka[ka.length-2].toFixed(1),pd:+da[da.length-2].toFixed(1)};
}
function buildSig(c,sym){
  if(!c||!c.rsi||!c.kd)return{s:"HOLD"};
  const{rsi:r,kd:k,price:p,high500,low500,ma20}=c;
  const{sl:SLP,tp:TPP}=getSLTP(sym);
  const gx=k.pk<=k.pd&&k.k>k.d,dx=k.pk>=k.pd&&k.k<k.d;
  const aboveMA20=ma20&&p>ma20;
  const belowMA20=ma20&&p<ma20;
  if(gx&&k.k<30&&k.d<30&&r<30&&aboveMA20){
    const sl=+(p*(1-SLP)).toFixed(4),tp=+(p*(1+TPP)).toFixed(4);
    if(high500&&low500&&sl>low500&&tp<high500)
      return{s:"LONG",sl,tp,slPct:SLP*100,tpPct:TPP*100,
        reason:`KD金叉（K=${k.k} 穿越 D=${k.d}）\nRSI超賣 ${r}，反彈機率高`,type:"KD金叉反彈",
        time:new Date().toLocaleString("zh-TW",{timeZone:"Asia/Taipei"})};
  }
  if(dx&&k.k>70&&k.d>70&&r>70&&belowMA20){
    const sl=+(p*(1+SLP)).toFixed(4),tp=+(p*(1-TPP)).toFixed(4);
    if(high500&&low500&&sl<high500&&tp>low500)
      return{s:"SHORT",sl,tp,slPct:SLP*100,tpPct:TPP*100,
        reason:`KD死叉（K=${k.k} 跌破 D=${k.d}）\nRSI超買 ${r}，回調風險高`,type:"KD死叉反壓",
        time:new Date().toLocaleString("zh-TW",{timeZone:"Asia/Taipei"})};
  }
  if((k.k<35&&r<45)||(k.k>65&&r>55))return{s:"WATCH"};
  return{s:"HOLD"};
}

const fmt=n=>{if(!n&&n!==0)return"—";if(n<0.001)return n.toFixed(6);if(n<1)return n.toFixed(4);if(n<100)return n.toFixed(3);return n.toLocaleString("en-US",{maximumFractionDigits:2})};

// RSI color & bar
function rsiColor(r){return!r?"#c4a898":r<35?"#28a870":r>65?"#e04858":"#d4903a"}
function rsiBar(val,height=4){
  if(!val)return`<div style="height:${height}px;background:rgba(0,0,0,.06);border-radius:10px"></div>`;
  const col=rsiColor(val);
  const w=Math.min(100,val);
  return`<div class="rsi-bar-track" style="height:${height}px"><div class="rsi-bar-fill" style="width:${w}%;background:${col}"></div></div>`;
}

const kdColor=k=>!k?"#c4a898":k<30?"#28a870":k>70?"#d4903a":"#c4a898";
const SL2={LONG:"做多",SHORT:"做空",WATCH:"觀望",HOLD:"持有",HOLDING:"持倉中"};
const TR={BULL:"↑ 日線多頭",BEAR:"↓ 日線空頭",NEUTRAL:"→ 日線中性"};

function calcLivePnl(openSig,currentPrice){
  const entry=parseFloat(openSig.entry_price);
  if(!currentPrice||!entry)return null;
  const pct=openSig.direction==="LONG"?((currentPrice-entry)/entry)*100:((entry-currentPrice)/entry)*100;
  return parseFloat(pct.toFixed(2));
}

async function manualClose(id){
  const sig=allSignals.find(s=>s.id===id);
  if(!sig)return;
  const exitPrice=prompt(`手動平倉｜${sig.symbol.replace("USDT","")}/USDT\n請輸入出場價格：`);
  if(!exitPrice||isNaN(parseFloat(exitPrice)))return;
  const entry=parseFloat(sig.entry_price);
  const exit=parseFloat(exitPrice);
  const pnlPct=sig.direction==="LONG"
    ?+((exit-entry)/entry*100).toFixed(2)
    :+((entry-exit)/entry*100).toFixed(2);
  const result=pnlPct>=0?"WIN":"LOSS";
  const ok=window.confirm(`出場價：$${exit}\n損益：${pnlPct>=0?"+":""}${pnlPct}%\n結果：${result==="WIN"?"獲利 ✅":"虧損 ❌"}\n\n確認平倉？`);
  if(!ok)return;
  try{
    await fetch(`${SUPABASE_URL}/rest/v1/signals?id=eq.${id}`,{
      method:"PATCH",
      headers:{
        "apikey":SUPABASE_KEY,
        "Authorization":`Bearer ${SUPABASE_KEY}`,
        "Content-Type":"application/json",
        "Prefer":"return=minimal"
      },
      body:JSON.stringify({status:result,result,exit_price:exit,pnl_pct:pnlPct,actual_pnl:pnlPct,closed_at:new Date().toISOString()})
    });
    await loadSignals();render();renderPerf();
    alert(`已記錄平倉！${pnlPct>=0?"+":""}${pnlPct}%`);
  }catch(e){alert("平倉記錄失敗，請重試");}
}

async function updateSignal(id, field, value){
  try{
    const body={};
    if(field==="entered") body.entered = value===""?null:value==="true";
    if(field==="actual_pnl") body.actual_pnl = value===""?null:parseFloat(value);
    await fetch(`${SUPABASE_URL}/rest/v1/signals?id=eq.${id}`,{
      method:"PATCH",
      headers:{
        "apikey":SUPABASE_KEY,
        "Authorization":`Bearer ${SUPABASE_KEY}`,
        "Content-Type":"application/json",
        "Prefer":"return=minimal"
      },
      body:JSON.stringify(body)
    });
    const sig=allSignals.find(s=>s.id===id);
    if(sig){
      if(field==="entered") sig.entered=body.entered;
      if(field==="actual_pnl") sig.actual_pnl=body.actual_pnl;
    }
  }catch(e){console.error("更新失敗",e);}
}

      <div class="sc-head">${dirIcon}<span class="sc-title ${sg.s}">${isLong?"做多":"做空"} ｜ ${sym.replace("USDT","")}/USDT 永續</span></div>
      <div class="sc-prices">
        <div class="sc-pitem"><div class="sc-plbl">${IC.dot} 進場價</div><div class="sc-pval e" style="font-size:14px">$${fmt(c.price)}</div></div>
        <div class="sc-pitem"><div class="sc-plbl" style="color:#e04858">${IC.x} 止損 -${sg.slPct}%</div><div class="sc-pval s">$${fmt(sg.sl)}</div></div>
        <div class="sc-pitem"><div class="sc-plbl" style="color:#28a870">${IC.check} 止盈 +${sg.tpPct}%</div><div class="sc-pval t">$${fmt(sg.tp)}</div></div>
      </div>
      <div class="sc-reason"><strong>進場依據：</strong><br>${sg.reason.replace(/\n/g,"<br>")}</div>
      <div class="sc-meta">${IC.clock} ${sg.time||""} &nbsp;·&nbsp; ${IC.trend} ${sg.type} ｜ 1小時K ｜ 報酬比 1:2</div>
    </div>`;
  } else {
    sigHTML=`<div style="background:rgba(0,0,0,.04);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:14px;text-align:center">
      <div style="font-size:13px;color:var(--muted);margin-bottom:4px">${sg.s==="WATCH"?"觀望中":"目前無信號"}</div>
      <div style="font-size:11px;color:var(--muted)">${sg.s==="WATCH"?"指標接近關鍵區間，持續觀察中":"尚未達到進場條件，等待KD金叉/死叉"}</div>
    </div>`;
  }

  document.getElementById("dpc").innerHTML=`
    <div class="dhead">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div><div class="dsym">${sym.replace("USDT","")}<span>/USDT</span></div><div class="dname">${NM[sym]||""} · 永續合約</div></div>
        <div style="text-align:right"><div class="dprice">$${fmt(c.price)}</div><div class="dchg ${up?"up":"dn"}">${up?"+":""}${c.change24h?.toFixed(2)}%</div></div>
      </div>
    </div>
    <div class="dbody">
      <div class="trbadge ${c.tr||"NEUTRAL"}">${TR[c.tr||"NEUTRAL"]}</div>
      <div class="d-rsi-wrap">
        <div class="d-rsi-title">指標數值</div>
        <div class="d-rsi-row">
          <span class="d-rsi-lbl">RSI</span>
          <div class="d-rsi-track">${rsiBar(c.rsi,5).replace('class="rsi-bar-track"','style="flex:1"')}<div class="d-rsi-fill" style="width:${Math.min(100,c.rsi||0)}%;background:${rc}"></div></div>
          <span class="d-rsi-val" style="color:${rc}">${c.rsi||"—"}</span>
        </div>
        <div class="d-rsi-row">
          <span class="d-rsi-lbl">K</span>
          <div class="d-rsi-track"><div class="d-rsi-fill" style="width:${Math.min(100,c.kd?.k||0)}%;background:${kc}"></div></div>
          <span class="d-rsi-val" style="color:${kc}">${c.kd?.k||"—"}</span>
        </div>
        <div class="d-rsi-row">
          <span class="d-rsi-lbl">D</span>
          <div class="d-rsi-track"><div class="d-rsi-fill" style="width:${Math.min(100,c.kd?.d||0)}%;background:#c4a898"></div></div>
          <span class="d-rsi-val">${c.kd?.d||"—"}</span>
        </div>
        <div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">
          ${anaRows.map(([l,v,note])=>`<div class="ana-row"><span class="ana-row-lbl">${l}</span><span class="ana-row-val">${v} ${note}</span></div>`).join("")}
        </div>
      </div>
      ${sigHTML}
      <div class="dwarn">⚠️ 以上僅供參考，不構成投資建議。加密貨幣具高度風險，請謹慎評估。</div>
    </div>`;

  document.getElementById("ovl").style.display="block";
  document.getElementById("dpanel").style.display="block";
}

function closeP(){
  document.getElementById("ovl").style.display="none";
  document.getElementById("dpanel").style.display="none";
}

function setTab(tab,el){
  currentTab=tab;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("on"));
  el.classList.add("on");
  document.querySelectorAll(".page").forEach(p=>{p.classList.remove("active");p.style.display="none";});
  const pid=tab==="long"?"page-long":tab==="short"?"page-short":tab==="perf"?"page-perf":"page-market";
  const pg=document.getElementById(pid);
  if(pg){pg.classList.add("active");pg.style.display="block";}
  if(tab==="perf")renderPerf();
}

// ── Load ─────────────────────────────────────────────────
async function load(sym,i){
  const[h1,tk]=await Promise.all([bk(sym,"60",500),bt(sym)]);
  if(!h1||!tk)return;
  D[sym]={
    price:tk.p,change24h:tk.ch,
    rsi:calcRSI(h1.c),
    kd:calcKD(h1.h,h1.lo,h1.c),
    high500:Math.max(...h1.h),
    low500:Math.min(...h1.lo),
    ma20:ma(h1.c,20),
  };
  document.getElementById("load-n").textContent=`${i+1} / ${SYMS.length}`;
  document.getElementById("pgfill").style.width=`${((i+1)/SYMS.length)*100}%`;
}

async function init(){
  document.getElementById("pgwrap").style.display="block";
  await loadSignals();
  for(let i=0;i<SYMS.length;i++){
    await load(SYMS[i],i);
    if(i%4===3)await new Promise(r=>setTimeout(r,80));
  }
  document.getElementById("pgwrap").style.display="none";
  document.getElementById("loading").style.display="none";
  document.getElementById("page-market").style.display="block";
  loaded=true;render();
  setInterval(async()=>{
    await Promise.all(SYMS.map(async s=>{const t=await bt(s);if(t&&D[s]){D[s].price=t.p;D[s].change24h=t.ch;}}));
    render();
  },30000);
  setInterval(async()=>{
    await loadSignals();render();
    if(currentTab==="perf")renderPerf();
  },5*60*1000);
  setInterval(async()=>{
    for(let i=0;i<SYMS.length;i++){await load(SYMS[i],i);await new Promise(r=>setTimeout(r,180));}
    render();
  },15*60*1000);
}
init();
</script>
</body>
</html>
